<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback MicroCoach | Kandid Conversations</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C0392B;
      --red-dark: #962d22;
      --red-light: #fdf1f0;
      --teal: #0f7b6c;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-light: #999;
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e4df;
      --border-light: #f0ece8;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 18px; color: #fff; letter-spacing: -0.5px;
    }

    .header-text { display: flex; flex-direction: column; }
    .header-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .header-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }

    .reset-btn {
      font-size: 13px; color: var(--text-muted);
      background: none; border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 20px;
      cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .reset-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 120px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Messages ── */
    .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.25s ease; }
    .msg.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
    }
    .avatar.ck { background: var(--red); color: #fff; }
    .avatar.you { background: #f0ece8; color: var(--text-muted); border: 1px solid var(--border); }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.7;
    }
    .bubble.ck {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      color: var(--text);
      box-shadow: var(--shadow);
    }
    .bubble.you {
      background: var(--red);
      color: #fff;
      border-radius: 16px 4px 16px 16px;
    }

    /* ── One-pager card ── */
    .onepager {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--red);
      border-radius: 4px 16px 16px 16px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
      max-width: 92%;
      font-size: 14px;
    }
    .op-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }
    .op-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--red);
      background: var(--red-light); padding: 3px 8px; border-radius: 20px;
    }
    .op-title { font-size: 15px; font-weight: 600; color: var(--text); }

    .op-section { margin-bottom: 14px; }
    .op-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-light);
      margin-bottom: 5px;
    }
    .op-body { font-size: 14px; line-height: 1.7; color: var(--text); }
    .op-body .diffuser { color: var(--teal); font-style: italic; font-size: 13px; }

    .checklist { list-style: none; }
    .checklist li {
      font-size: 13px; color: var(--text-muted);
      padding: 3px 0; display: flex; gap: 8px; align-items: flex-start;
    }
    .check-box {
      width: 14px; height: 14px; border: 1.5px solid var(--border);
      border-radius: 3px; flex-shrink: 0; margin-top: 2px;
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex; align-items: center; gap: 4px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      box-shadow: var(--shadow);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-light);
      animation: pulse 1.3s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,60%,100%{opacity:0.3;transform:scale(1)} 30%{opacity:1;transform:scale(1.3)} }

    /* ── Input bar ── */
    .input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 14px 1.25rem 20px;
    }
    .input-inner {
      max-width: 720px; margin: 0 auto;
      display: flex; gap: 10px; align-items: flex-end;
    }
    textarea {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      resize: none;
      min-height: 46px;
      max-height: 130px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--red); }
    textarea::placeholder { color: var(--text-light); }

    .send {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--red); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .send:hover { background: var(--red-dark); }
    .send:active { transform: scale(0.94); }
    .send:disabled { background: #ddd; cursor: not-allowed; }
    .send svg { width: 18px; height: 18px; fill: #fff; }

    .hint {
      text-align: center; font-size: 11px; color: var(--text-light);
      margin-top: 8px;
    }

    /* ── Starter chips ── */
    .starters {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
    }
    .chip {
      font-size: 13px; color: var(--red);
      background: var(--red-light);
      border: 1px solid #f0c8c4;
      padding: 6px 14px; border-radius: 20px;
      cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .chip:hover { background: #f8e0de; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .bubble, .onepager { max-width: 94%; font-size: 14px; }
      header { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">K</div>
    <div class="header-text">
      <span class="header-title">Feedback MicroCoach</span>
      <span class="header-sub">Kandid Conversations</span>
    </div>
  </div>
  <button class="reset-btn" onclick="resetChat()">Start over</button>
</header>

<main id="chat"></main>

<div class="input-bar">
  <div class="input-inner">
    <textarea id="input" placeholder="Describe your situation or type your response..." rows="1"></textarea>
    <button class="send" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; Responses are coaching guides, not legal or HR advice</p>
</div>

<script>
  let history = [];
  let busy = false;

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  function addMsg(role, text, isOnePager) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const initials = role === 'user' ? 'You' : 'CK';
    const avClass = role === 'user' ? 'you' : 'ck';

    if (isOnePager) {
      wrap.innerHTML = `
        <div class="avatar ck">CK</div>
        <div class="onepager">${buildOnePager(text)}</div>`;
    } else {
      wrap.innerHTML = `
        <div class="avatar ${avClass}">${initials}</div>
        <div class="bubble ${role === 'user' ? 'you' : 'ck'}">${fmt(text)}</div>`;
    }
    chat.appendChild(wrap);
    wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  function fmt(t) {
    return t
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/\n/g,'<br>');
  }

  function buildOnePager(raw) {
    const inner = raw.replace('---ONE-PAGER---','').replace('---END ONE-PAGER---','').trim();
    const lines = inner.split('\n');
    const sections = ['OPENING (30-SECOND RULE)', 'MAIN MESSAGE', 'CLOSING', 'ABOUT THIS SCRIPT', 'BEFORE YOU START', 'DURING THE CONVERSATION', 'IF THINGS GET DIFFICULT'];
    let html = `<div class="op-header"><span class="op-badge">One-Pager</span><span class="op-title">Your Conversation Plan</span></div>`;
    let cur = null, body = [];

    function flush() {
      if (!cur) return;
      const isCheck = body.some(l => l.trim().startsWith('☐'));
      html += `<div class="op-section"><div class="op-label">${cur}</div>`;
      if (isCheck) {
        html += '<ul class="checklist">';
        body.forEach(l => { if(l.trim().startsWith('☐')) html += `<li><span class="check-box"></span>${l.replace('☐','').trim()}</li>`; });
        html += '</ul>';
      } else {
        const bodyText = body.join(' ').replace(/\[DIFFUSER[^\]]*\]/g, match => `<span class="diffuser">${match}</span>`);
        html += `<div class="op-body">${fmt(bodyText)}</div>`;
      }
      html += '</div>';
    }

    lines.forEach(line => {
      const t = line.trim();
      const match = sections.find(s => t.startsWith(s + ':') || t === s);
      if (match) {
        flush(); cur = match; body = [];
        const after = t.substring(match.length + 1).trim();
        if (after) body.push(after);
      } else if (t) {
        body.push(t);
      }
    });
    flush();
    return html;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'msg'; d.id = 'typing';
    d.innerHTML = `<div class="avatar ck">CK</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chat.appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;

    // Remove starters if present
    document.getElementById('starters-wrap')?.remove();

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    input.value = ''; input.style.height = 'auto';
    busy = true; sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      const reply = data.reply || 'Something went wrong. Please try again.';
      history.push({ role: 'assistant', content: reply });
      hideTyping();
      addMsg('assistant', reply, reply.includes('---ONE-PAGER---'));
    } catch {
      hideTyping();
      addMsg('assistant', 'Something went wrong. Please check your connection and try again.');
    }

    busy = false; sendBtn.disabled = false;
  }

  function useChip(text) {
    input.value = text;
    send();
  }

  function resetChat() {
    history = [];
    chat.innerHTML = '';
    init();
  }

  function init() {
    const greeting = "Hi! I'm here to help you prepare for a difficult conversation at work — whether you need to give feedback to a direct report, address something with a peer, or navigate a challenging situation with your manager.\n\nWhat's going on? Tell me about the conversation you need to have.";
    addMsg('assistant', greeting);
    history.push({ role: 'assistant', content: greeting });

    // Starter chips
    const starters = document.createElement('div');
    starters.id = 'starters-wrap';
    starters.className = 'msg';
    starters.style.paddingLeft = '42px';
    starters.innerHTML = `<div class="starters">
      <button class="chip" onclick="useChip('I need to address a performance issue with a direct report.')">Performance issue with direct report</button>
      <button class="chip" onclick="useChip('My manager keeps making last-minute changes that affect my work.')">Last-minute changes from my manager</button>
      <button class="chip" onclick="useChip('A coworker interrupted me in a meeting and I need to address it.')">Coworker interrupted me in a meeting</button>
      <button class="chip" onclick="useChip('I want to recognize someone on my team for excellent work.')">Recognize someone's excellent work</button>
    </div>`;
    chat.appendChild(starters);
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 130) + 'px';
  });

  init();
</script>
</body>
</html>
